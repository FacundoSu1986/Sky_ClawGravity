# Configuración de Agente IA para Sky-Claw
# Copiar a ~/.sky_claw/agent_config.yaml y adaptar

# Identidad del agente
agent:
  name: "sky-claw-assistant"
  version: "2026.03"
  description: "Agente autónomo para gestión de mods de Skyrim"
  personality:
    tone: "professional"
    verbosity: "concise"
    language: "es"

# Configuración de LLM
llm:
  # Proveedor principal
  primary_provider: "anthropic"
  
  # Modelo principal
  primary_model: "claude-4-5-sonnet"
  
  # Modelo de fallback
  fallback_model: "claude-4-5-haiku"
  
  # Modelos permitidos (lista blanca)
  allowed_models:
    - "claude-4-5-sonnet"
    - "claude-4-5-haiku"
    - "gpt-4o"
    - "gpt-4o-mini"
    - "deepseek-chat"
  
  # Rate limiting
  rate_limit:
    requests_per_minute: 60
    tokens_per_minute: 100000
    burst_limit: 10
  
  # Timeouts
  timeouts:
    connection: 30
    read: 120
    total: 300
  
  # Retry configuration
  retry:
    max_attempts: 5
    initial_delay: 1.0
    max_delay: 60.0
    exponential_base: 2.0
  
  # Cost controls
  cost_control:
    enabled: true
    daily_budget_usd: 50.0
    alert_threshold: 0.8  # 80% del presupuesto
    hard_limit: true

# Configuración RAG
rag:
  enabled: true
  
  # Vector database
  vector_store:
    type: "qdrant"  # qdrant, pinecone, weaviate, chroma
    host: "localhost"
    port: 6333
    collection: "sky_claw_knowledge"
  
  # Embedding model
  embedding:
    model: "text-embedding-3-large"
    dimensions: 1536
    batch_size: 100
  
  # Retrieval configuration
  retrieval:
    k: 5
    score_threshold: 0.7
    hybrid_search: true
    bm25_weight: 0.3
    vector_weight: 0.7
  
  # Reranking
  reranker:
    enabled: true
    model: "bge-reranker-large"
    top_k: 5
  
  # Caching
  cache:
    enabled: true
    ttl_seconds: 3600
    max_size: 10000

# Human-in-the-Loop
hitl:
  enabled: true
  
  # Operaciones que requieren aprobación
  require_approval_for:
    - "external_download"
    - "model_change"
    - "config_update"
    - "bulk_mod_install"
    - "system_command"
  
  # Canales de aprobación
  approval_channels:
    - "telegram"
    - "gui"
  
  # Timeout para aprobación
  approval_timeout_seconds: 300

# Network Gateway
network_gateway:
  enabled: true
  
  # Dominios permitidos
  allowed_domains:
    - "localhost:6333"
    - "nexusmods.com"
    - "*.nexusmods.com"
    - "github.com"
    - "api.github.com"
    - "loot.github.io"
    - "cdn.modrinth.com"
  
  # Dominios bloqueados
  blocked_domains:
    - "malware-site.com"
  
  # Verificar certificados SSL
  verify_ssl: true

# Seguridad
security:
  # Encriptación
  encryption:
    enabled: true
    algorithm: "AES-256-GCM"
  
  # Secret management
  secrets:
    provider: "environment"  # environment, aws-secrets, azure-keyvault
    prefix: "SKYCLAW_"
  
  # Audit logging
  audit:
    enabled: true
    log_api_calls: true
    log_config_changes: true
    log_user_actions: true
  
  # PII detection
  pii_detection:
    enabled: true
    redact_before_llm: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # Formato
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  
  # Handlers
  handlers:
    console:
      enabled: true
      level: "INFO"
    file:
      enabled: true
      level: "DEBUG"
      path: "logs/sky_claw.log"
      rotation:
        enabled: true
        max_bytes: 5242880  # 5 MB
        backup_count: 3
  
  # Log request bodies (cuidado con datos sensibles)
  log_request_bodies: false
  
  # Log response bodies
  log_response_bodies: false

# Monitoreo
monitoring:
  enabled: true
  
  # Métricas
  metrics:
    enabled: true
    provider: "prometheus"  # prometheus, datadog, newrelic
    port: 9090
  
  # Tracing
  tracing:
    enabled: true
    provider: "langsmith"  # langsmith, phoenix, wandb
    sample_rate: 0.1
  
  # Alertas
  alerts:
    enabled: true
    channels:
      - "telegram"
      - "email"
    rules:
      - name: "high_error_rate"
        condition: "error_rate > 0.05"
        threshold: 5  # minutos
      - name: "budget_exceeded"
        condition: "cost > daily_budget * 0.8"
        threshold: 1  # minuto
      - name: "high_latency"
        condition: "p95_latency > 5000"
        threshold: 10  # minutos

# Testing
testing:
  # Tests automáticos
  auto_test:
    enabled: true
    run_on_deploy: true
    coverage_threshold: 0.8
  
  # Mock externo en tests
  mock_external: true
  
  # Fixtures
  fixtures_path: "tests/fixtures"

# Performance
performance:
  # Thread pool
  thread_pool:
    max_workers: 10
    queue_size: 100
  
  # Connection pool
  connection_pool:
    max_connections: 50
    max_idle: 10
    timeout: 30
  
  # Caching general
  caching:
    enabled: true
    backend: "redis"  # redis, memory, memcached
    ttl_default: 300
