[confidence_thresholds]
final_exit = 0.90
phase_exit_base = 0.70

[hitl_triggers]
confidence_below = 0.70
timeout_minutes = 30
irreversible_action = true

[vector_store]
mode = "local_wsl2"
backend = "sqlite_vss"
path = "~/.agents/memory/core_vector.db"
encryption = "AES-256"
data_residency = "local_only"
