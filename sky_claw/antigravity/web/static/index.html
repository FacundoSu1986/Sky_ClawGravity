<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky-Claw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #58a6ff;
        }

        header .subtitle {
            font-size: 12px;
            color: #8b949e;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            margin-left: auto;
        }

        .status-dot.thinking {
            background: #d29922;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #1f6feb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: center;
            background: #3d1f1f;
            border: 1px solid #f85149;
            color: #f85149;
            font-size: 13px;
        }

        .tool-info {
            margin-top: 8px;
            padding: 8px 12px;
            background: #161b22;
            border-radius: 6px;
            border: 1px solid #30363d;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }

        .tool-info summary {
            color: #8b949e;
            font-weight: 500;
        }

        .tool-info pre {
            margin-top: 6px;
            color: #7ee787;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 11px;
            overflow-x: auto;
        }

        .thinking-indicator {
            align-self: flex-start;
            color: #8b949e;
            font-size: 13px;
            padding: 8px 16px;
        }

        .thinking-indicator span {
            animation: dots 1.4s infinite;
        }

        .thinking-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dots {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        #input-area {
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
        }

        #input-area textarea {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 120px;
        }

        #input-area textarea:focus {
            border-color: #58a6ff;
        }

        #input-area button {
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #input-area button:hover { background: #2ea043; }
        #input-area button:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            color: #8b949e;
            padding: 40px 20px;
        }

        .welcome h2 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .message { max-width: 90%; }
            header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Sky-Claw</h1>
        <span class="subtitle">Skyrim Mod Manager</span>
        <div class="status-dot" id="status-dot"></div>
    </header>

    <div id="chat-area">
        <div class="welcome">
            <h2>Sky-Claw</h2>
            <p>Agente de modding para Skyrim. Preguntame sobre tu modlist, conflictos, load order, o pedime que instale mods.</p>
        </div>
    </div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Escribi tu mensaje..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        let isFirstMessage = true;

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function addMessage(text, role) {
            if (isFirstMessage) {
                const welcome = chatArea.querySelector('.welcome');
                if (welcome) welcome.remove();
                isFirstMessage = false;
            }

            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function showThinking() {
            const div = document.createElement('div');
            div.className = 'thinking-indicator';
            div.id = 'thinking';
            div.innerHTML = 'Pensando<span>.</span><span>.</span><span>.</span>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            statusDot.classList.add('thinking');
        }

        function hideThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
            statusDot.classList.remove('thinking');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            showThinking();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                hideThinking();
                const data = await resp.json();

                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    addMessage(data.response, 'assistant');
                }
            } catch (err) {
                hideThinking();
                addMessage('Error de conexion: ' + err.message, 'error');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        userInput.focus();
    </script>
</body>
</html>
