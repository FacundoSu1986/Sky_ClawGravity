name: Sky-Claw CI/CD

on:
  push:
    branches: [main, master, "feature/**", "claude/**", "copilot/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# CI-FIX-001: Opt into Node.js 24 now — Node.js 20 actions are deprecated
# and will be forced off on 2026-06-02 and removed 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate 1: Code Quality ─────────────────────────────
  lint:
    name: "🔍 Lint (Ruff) / py${{ matrix.python-version }}"
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # CI-FIX-002: Install ruff via dev extras for version consistency with
      # local dev environment. Avoids silent format drift caused by unpinned
      # `pip install ruff` resolving to a different minor/patch than local.
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check sky_claw/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check sky_claw/ tests/

  # ── Gate 2: Type Safety ──────────────────────────────
  typecheck:
    name: "🏷️ Type Check (Mypy) / py${{ matrix.python-version }}"
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Mypy check
        run: python -m mypy sky_claw/ --ignore-missing-imports --no-error-summary

  # ── Gate 3: Test Suite ───────────────────────────────
  test:
    name: "🧪 Tests / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    continue-on-error: ${{ matrix.os == 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=sky_claw --cov-report=xml --cov-fail-under=55 tests/
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

  # ── Gate 4: Security ─────────────────────────────────
  security:
    name: "🛡️ Security Scan"
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools + project
        run: |
          pip install -e .
          pip install bandit pip-audit setuptools
      - name: Bandit (SAST)
        run: bandit -r sky_claw/ -ll
      - name: Pip-audit (SCA)
        run: pip-audit --skip-editable -r requirements.lock

  # ── Summary jobs: exact names required by branch protection ──────────────
  # Branch protection requires single-name checks; matrix produces /py3.11
  # variants.  These fan-in jobs re-publish a result under the protected names
  # so the gate is satisfied without changing branch protection settings.

  lint-summary:
    name: "🔍 Lint (Ruff)"
    needs: [lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check lint matrix result
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint matrix failed: ${{ needs.lint.result }}"
            exit 1
          fi

  typecheck-summary:
    name: "🏷️ Type Check (Mypy)"
    needs: [typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check typecheck matrix result
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "Typecheck matrix failed: ${{ needs.typecheck.result }}"
            exit 1
          fi

  test-summary:
    name: "🧪 Tests (Pytest)"
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test matrix result
        run: |
          # Ubuntu matrix jobs use continue-on-error so their failures are
          # already masked in needs.test.result.  A 'failure' here means a
          # Windows job failed — that is a hard blocker.
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test matrix failed: ${{ needs.test.result }}"
            exit 1
          fi

  # ── Gate 5: Build ────────────────────────────────────
  build:
    name: "📦 Build"
    needs: [lint-summary, typecheck-summary, test-summary, security]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: pyinstaller sky_claw.spec --clean
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SkyClawApp-exe
          path: dist/SkyClawApp.exe
