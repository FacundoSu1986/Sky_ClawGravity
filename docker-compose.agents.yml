version: "3.8"

# ==============================================================================
# SKY-CLAW - DOCKER SANDBOX FOR EXTERNAL AGENTS (>30k STARS)
# ==============================================================================
# Este archivo define contenedores aislados (Sandboxes) para que agentes como 
# OpenHands o AutoGPT puedan generar y probar código sin riesgo de dañar 
# tu sistema Windows nativo.
# 
# Ejecución: docker-compose -f docker-compose.agents.yml up -d openhands
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # 1. All-Hands-AI/OpenHands (Entorno Aislado)
  # ----------------------------------------------------------------------------
  openhands:
    image: ghcr.io/all-hands-ai/openhands:latest
    container_name: skyclaw_openhands_sandbox
    environment:
      - WORKSPACE_MOUNT_PATH=/workspace
      - SANDBOX_USER_ID=1000 # Minimiza problemas de permisos root
      # Pasa el LLM Token de forma segura sin exponerlo en logs
      - LLM_API_KEY=${OPENAI_API_KEY:-${ANTHROPIC_API_KEY}} 
    ports:
      - "3000:3000" # UI de OpenHands
    volumes:
      # Monta SÓLO el repositorio local, nunca discos completos (Ej: C:/)
      - ./:/workspace:rw 
      # Monta el socket de Docker (requerido por OpenHands para sub-contenedores)
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      # Evita escalada de privilegios
      - no-new-privileges:true
    # Limita el consumo de recursos para que un agente rebelde no sature la PC
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ----------------------------------------------------------------------------
  # 2. Significant-Gravitas/AutoGPT (Investigación y Tareas de Larga Duración)
  # ----------------------------------------------------------------------------
  autogpt:
    image: significantgravitas/autogpt:latest
    container_name: skyclaw_autogpt_worker
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXECUTE_LOCAL_COMMANDS=False # Deshabilitado por defecto por seguridad
      - RESTRICT_TO_WORKSPACE=True
    volumes:
      # Monta sólo el subdirectorio de output
      - ./autogpt_workspace:/app/autogpt/auto_gpt_workspace:rw
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
